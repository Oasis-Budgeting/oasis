services:
  oasis:
    image: ghcr.io/oasis-budgeting/oasis:latest
    container_name: oasis
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}
      - METRICS_SECRET=${METRICS_SECRET:-dev-metrics-secret-key}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
